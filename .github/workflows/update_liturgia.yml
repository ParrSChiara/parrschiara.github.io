name: Aggiornamento liturgia

on:
  schedule:
    - cron: '0 5 * * 1'  # ogni lunedì alle 05:00 UTC
  workflow_dispatch:      # esecuzione manuale dalla UI di GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Scarica i prossimi 90 giorni
        run: |
          START=$(date +%Y-%m-%d)
          END=$(date -d "+90 days" +%Y-%m-%d)
          python scraper.py $START $END

      - name: Committa i nuovi file JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/liturgia/
          git diff --staged --quiet || git commit -m "Aggiornamento liturgia $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
