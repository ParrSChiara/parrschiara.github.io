<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore PDF — Parrocchia Santa Chiara</title>
    <link rel="icon" href="assets/logo/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 72px;
        }

        /* ── Visualizzatore PDF ── */
        #pdf-viewer {
            position: relative;
            z-index: 1;
            margin-top: 56px; /* altezza topbar */
            width: 100%;
            max-width: 680px;
            padding: 1.25rem 1rem 1rem;
        }

        .pdf-page {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: .75rem;
        }
        .pdf-page canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--cream-dark);
            box-shadow: 0 2px 12px rgba(28,16,7,.08);
        }

        .pdf-loading {
            padding: 4rem 2rem;
            text-align: center;
        }
        .pdf-loading p {
            font-family: var(--font-display);
            font-size: .7rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--muted);
            animation: pulse 1.6s ease infinite;
        }

        /* ── Barra download fissa ── */
        .download-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
        }
        #download-button {
            display: block;
            width: 100%;
            padding: 1.15rem 1.5rem;
            background: var(--burgundy);
            color: var(--cream);
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .14em;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            transition: background .2s ease;
        }
        #download-button:hover { background: var(--burg-dark); }
    </style>
</head>
<body>

<div class="topbar">
    <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Home
    </a>
    <span class="topbar-title" id="topbar-title">Documento</span>
</div>

<div id="pdf-viewer">
    <div class="pdf-loading"><p>Caricamento documento…</p></div>
</div>

<div class="download-bar">
    <a id="download-button" href="#" download>Scarica PDF</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pdfFile = urlParams.get('file');

    if (pdfFile) {
        const pdfUrl = `assets/pdf/${pdfFile}`;
        const label = pdfFile.replace('.pdf', '').replace(/_/g, ' ');

        document.title = label + ' — Parrocchia Santa Chiara';
        document.getElementById('topbar-title').textContent = label;

        const downloadBtn = document.getElementById('download-button');
        downloadBtn.href = pdfUrl;
        downloadBtn.download = pdfFile;

        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        const viewer = document.getElementById('pdf-viewer');

        async function renderPDF(url) {
            const pdfDoc = await pdfjsLib.getDocument(url).promise;
            viewer.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const wrap = document.createElement('div');
                wrap.className = 'pdf-page';
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                wrap.appendChild(canvas);
                viewer.appendChild(wrap);
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            }
        }

        renderPDF(pdfUrl);
    } else {
        document.getElementById('pdf-viewer').innerHTML =
            '<div class="pdf-loading"><p>Nessun file specificato</p></div>';
    }
</script>
</body>
</html>
