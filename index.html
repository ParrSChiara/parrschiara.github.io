<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrocchia Santa Chiara</title>
    <link rel="icon" href="assets/logo/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/logo/apple-touch-icon.png">
    <link rel="icon" sizes="192x192" href="assets/logo/android-chrome-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream:       #FAF7F2;
            --cream-mid:   #F0E9DF;
            --cream-dark:  #E3D8C8;
            --gold:        #A87C28;
            --gold-light:  #D4A84B;
            --burgundy:    #6B2035;
            --burg-dark:   #4E1626;
            --text:        #1C1007;
            --muted:       #8A7660;
            --white:       #FFFEFB;
        }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background-color: var(--cream);
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* Parchment atmosphere */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 80%, rgba(168,124,40,.07) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 85% 15%, rgba(107,32,53,.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle tile cross motif */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='48' height='48' viewBox='0 0 48 48' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M24 8v32M8 24h32' stroke='%23A87C28' stroke-width='0.6' stroke-opacity='0.07'/%3E%3Ccircle cx='24' cy='24' r='3' fill='none' stroke='%23A87C28' stroke-width='0.5' stroke-opacity='0.06'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 440px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding-bottom: 2rem;
            animation: riseIn .9s cubic-bezier(.22,.61,.36,1) both;
        }

        .logo {
            width: 110px;
            height: auto;
            filter: drop-shadow(0 3px 10px rgba(28,16,7,.18));
            margin-bottom: 1.25rem;
        }

        .parish-name {
            font-family: 'Cinzel', serif;
            font-size: .6rem;
            font-weight: 600;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.1rem;
        }

        .ornament {
            display: flex;
            align-items: center;
            gap: .7rem;
            justify-content: center;
            margin-bottom: 1.1rem;
        }
        .ornament::before,
        .ornament::after {
            content: '';
            width: 56px;
            height: 1px;
            background: linear-gradient(to var(--side, right), var(--cream-dark), transparent);
        }
        .ornament::before { --side: right; }
        .ornament::after  { --side: left; }
        .ornament-glyph {
            font-size: .55rem;
            color: var(--gold);
            letter-spacing: .2em;
        }

        #current-date {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: .04em;
            color: var(--text);
        }

        /* ── LITURGICAL CARD ── */
        .card {
            background: var(--white);
            border: 1px solid var(--cream-dark);
            border-radius: 1px;
            padding: 1.4rem 1.4rem 1.4rem 1.7rem;
            margin-bottom: 2rem;
            position: relative;
            box-shadow: 0 2px 12px rgba(28,16,7,.07), 0 1px 3px rgba(28,16,7,.05);
            animation: riseIn .9s .14s cubic-bezier(.22,.61,.36,1) both;
            overflow: hidden;
        }

        /* Dynamic liturgical color stripe */
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--liturgy-accent, var(--gold));
            transition: background .6s ease;
        }

        /* Corner flourish */
        .card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 28px; height: 28px;
            border-top: 1px solid var(--cream-dark);
            border-right: 1px solid var(--cream-dark);
        }

        .card-eyebrow {
            font-family: 'Cinzel', serif;
            font-size: .52rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .8rem;
        }

        .liturgia-settimana {
            font-family: 'Cinzel', serif;
            font-size: .82rem;
            font-weight: 500;
            line-height: 1.45;
            color: var(--text);
            letter-spacing: .02em;
            margin-bottom: .55rem;
        }

        .liturgia-rango {
            display: flex;
            align-items: center;
            gap: .55rem;
            margin-bottom: 1.1rem;
        }

        .color-pip {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--liturgy-accent, var(--gold-light));
            box-shadow: 0 0 0 2px var(--white), 0 0 0 3px var(--liturgy-accent, var(--gold-light));
            flex-shrink: 0;
            transition: background .6s ease, box-shadow .6s ease;
        }

        .liturgia-celebrazione {
            font-size: .95rem;
            color: var(--muted);
            font-style: italic;
            line-height: 1.3;
        }

        .letture-row {
            display: flex;
            flex-wrap: wrap;
            gap: .35rem;
            padding-top: .9rem;
            border-top: 1px solid var(--cream-mid);
        }

        .lettura-chip {
            font-family: 'Cinzel', serif;
            font-size: .58rem;
            letter-spacing: .08em;
            color: var(--burgundy);
            text-decoration: none;
            border: 1px solid currentColor;
            padding: .22rem .55rem;
            border-radius: 1px;
            transition: all .18s ease;
            white-space: nowrap;
        }
        .lettura-chip:hover {
            background: var(--burgundy);
            color: var(--cream);
        }

        .loading-state {
            font-style: italic;
            color: var(--muted);
            font-size: 1rem;
        }

        /* ── BUTTONS ── */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 0;
            animation: riseIn .9s .28s cubic-bezier(.22,.61,.36,1) both;
        }

        .btn {
            font-family: 'Cinzel', serif;
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all .22s ease;
            text-align: center;
            line-height: 1.3;
        }

        .btn-filled {
            display: block;
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--burgundy);
            color: var(--cream);
            margin-bottom: .6rem;
            position: relative;
            overflow: hidden;
        }
        .btn-filled::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.08) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform .45s ease;
        }
        .btn-filled:hover {
            background: var(--burg-dark);
            box-shadow: 0 4px 20px rgba(107,32,53,.28);
            transform: translateY(-1px);
        }
        .btn-filled:hover::before { transform: translateX(100%); }
        .btn-filled:active { transform: translateY(0); }

        .btn-outlined {
            display: block;
            width: 100%;
            padding: .85rem 1.5rem;
            background: transparent;
            color: var(--burgundy);
            border: 1px solid var(--burgundy);
            margin-bottom: .6rem;
        }
        .btn-outlined:hover {
            background: var(--burgundy);
            color: var(--cream);
            box-shadow: 0 4px 16px rgba(107,32,53,.18);
            transform: translateY(-1px);
        }

        .rule {
            display: flex;
            align-items: center;
            gap: .7rem;
            margin: 1.1rem 0 .9rem;
        }
        .rule::before,
        .rule::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--cream-dark);
        }
        .rule-label {
            font-family: 'Cinzel', serif;
            font-size: .48rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .45rem;
        }

        .btn-ghost {
            padding: .85rem .6rem;
            background: transparent;
            color: var(--text);
            border: 1px solid var(--cream-dark);
            font-size: .58rem;
            letter-spacing: .12em;
        }
        .btn-ghost:hover {
            background: var(--cream-mid);
            border-color: var(--muted);
            color: var(--burgundy);
        }
        .btn-ghost.span-2 { grid-column: span 2; }

        /* ── ANIMATIONS ── */
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <img src="assets/logo.png" alt="Logo Parrocchia Santa Chiara" class="logo">
        <p class="parish-name">Parrocchia Santa Chiara</p>
        <div class="ornament">
            <span class="ornament-glyph">✦</span>
        </div>
        <p id="current-date">—</p>
    </header>

    <div class="card" id="liturgia-card">
        <p class="card-eyebrow">Liturgia del Giorno</p>
        <div id="liturgical-details">
            <p class="loading-state">Caricamento…</p>
        </div>
    </div>

    <div class="buttons">
        <button class="btn btn-filled" onclick="openPdfViewer('foglio_settimanale.pdf')">
            Foglietto Settimanale
        </button>
        <button class="btn btn-outlined" onclick="redirectToLiturgia()">
            Liturgia del Giorno
        </button>

        <div class="rule"><span class="rule-label">Preghiera</span></div>

        <div class="grid">
            <button class="btn btn-ghost span-2" onclick="openPdfViewer('adorazione.pdf')">Adorazione Eucaristica</button>
            <button class="btn btn-ghost" onclick="redirectToVespri()">Vespri</button>
            <button class="btn btn-ghost" onclick="openPdfViewer('compieta.pdf')">Compieta</button>
            <button class="btn btn-ghost" onclick="openPdfViewer('canti_liturgici.pdf')">Canti<br>Liturgici</button>
            <button class="btn btn-ghost" onclick="openPdfViewer('canti_adorazione.pdf')">Canti<br>Adorazione</button>
        </div>
    </div>

</div>
<script>
    const LITURGY_PALETTE = {
        bianco: '#C8B97A',
        verde:  '#3D7A50',
        rosso:  '#A62020',
        viola:  '#6B3FA0',
        rosa:   '#C97090',
        nero:   '#3A3A3A',
        oro:    '#A87C28',
    };

    function formatTodayDate() {
        const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
        const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
        const d = new Date();
        return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    async function fetchLiturgicalInfo() {
        const d = new Date();
        const dateStr = `${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`;

        try {
            const res = await fetch(`assets/liturgia/${dateStr}.json`);
            if (!res.ok) throw new Error();
            const data = await res.json();

            const accent = LITURGY_PALETTE[(data.colore||'').toLowerCase()] || LITURGY_PALETTE.oro;
            const card = document.getElementById('liturgia-card');
            card.style.setProperty('--liturgy-accent', accent);

            const letture = (data.letture || [])
                .map(l => `<a class="lettura-chip" href="${l.url}" target="_blank">${l.sigla}</a>`)
                .join('');

            const rangoHtml = data.celebrazione
                ? `<div class="liturgia-rango">
                     <span class="color-pip"></span>
                     <span class="liturgia-celebrazione">${data.celebrazione}${data.colore ? ' &mdash; ' + data.colore : ''}</span>
                   </div>`
                : '';

            document.getElementById('liturgical-details').innerHTML = `
                <p class="liturgia-settimana">${data.settimana || '—'}</p>
                ${rangoHtml}
                ${letture ? `<div class="letture-row">${letture}</div>` : ''}
            `;
        } catch {
            document.getElementById('liturgical-details').innerHTML =
                '<p class="loading-state">Informazioni non disponibili per oggi.</p>';
        }
    }

    function redirectToLiturgia() {
        const d = new Date();
        const s = `${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`;
        window.location.href = `https://www.lachiesa.it/calendario/${s}.html`;
    }

    function redirectToVespri() {
        window.location.href = 'https://www.ibreviary.com/m2/breviario.php?s=vespri';
    }

    function openPdfViewer(f) {
        window.location.href = `pdf_viewer.html?file=${encodeURIComponent(f)}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('current-date').textContent = formatTodayDate();
        fetchLiturgicalInfo();
    });
</script>
</body>
</html>
