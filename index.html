<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrocchia Santa Chiara</title>
    <link rel="icon" href="assets/logo/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/logo/apple-touch-icon.png">
    <link rel="icon" sizes="192x192" href="assets/logo/android-chrome-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* ── Header ── */
        header {
            text-align: center;
            padding-bottom: 2rem;
        }

        .logo {
            width: 110px;
            height: auto;
            filter: drop-shadow(0 3px 10px rgba(28,16,7,.18));
            margin-bottom: 1.25rem;
        }

        .parish-name {
            font-family: var(--font-display);
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        #current-date {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: .04em;
            color: var(--text);
            margin-top: 1rem;
        }

        /* ── Card liturgica ── */
        #liturgia-card {
            margin-bottom: 2rem;
        }

        .liturgia-settimana {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.45;
            color: var(--text);
            letter-spacing: .02em;
            margin-bottom: .6rem;
        }

        .liturgia-rango {
            display: flex;
            align-items: center;
            gap: .6rem;
            margin-bottom: 1.1rem;
        }

        .color-pip {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--liturgy-accent, var(--gold-light));
            box-shadow: 0 0 0 2px var(--white), 0 0 0 3.5px var(--liturgy-accent, var(--gold-light));
            flex-shrink: 0;
            transition: background .6s ease, box-shadow .6s ease;
        }

        .liturgia-celebrazione {
            font-family: var(--font-body);
            font-size: 1.05rem;
            color: var(--muted);
            font-style: italic;
            line-height: 1.3;
        }

        .letture-row {
            display: flex;
            flex-wrap: wrap;
            gap: .45rem;
            padding-top: .9rem;
            border-top: 1px solid var(--cream-mid);
        }

        .lettura-chip {
            font-family: var(--font-display);
            font-size: .75rem;
            letter-spacing: .07em;
            color: var(--burgundy);
            text-decoration: none;
            border: 1px solid currentColor;
            padding: .35rem .7rem;
            transition: all .18s ease;
            white-space: nowrap;
            min-height: 36px;
            display: inline-flex;
            align-items: center;
        }
        .lettura-chip:hover, .lettura-chip:focus-visible {
            background: var(--burgundy);
            color: var(--cream);
            outline: none;
        }

        .loading-state {
            font-style: italic;
            color: var(--muted);
            font-size: 1rem;
        }

        /* ── Griglia bottoni secondari ── */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .5rem;
            margin-top: .65rem;
        }
        .btn-grid .btn-ghost { padding: 1rem .75rem; }
        .span-2 { grid-column: span 2; }
    </style>
</head>
<body>
<div class="page-wrapper">

    <header class="anim-1">
        <img src="assets/logo.png" alt="Logo Parrocchia Santa Chiara" class="logo">
        <p class="parish-name">Parrocchia Santa Chiara</p>
        <div class="ornament"><span class="ornament-glyph">✦</span></div>
        <p id="current-date">—</p>
    </header>

    <div class="card anim-2" id="liturgia-card">
        <p class="card-eyebrow">Liturgia del Giorno</p>
        <div id="liturgical-details">
            <p class="loading-state">Caricamento…</p>
        </div>
    </div>

    <div class="anim-3">
        <button class="btn btn-filled" onclick="openPdfViewer('foglio_settimanale.pdf')">
            Foglietto Settimanale
        </button>
        <button class="btn btn-outlined" onclick="redirectToLiturgia()">
            Liturgia del Giorno
        </button>

        <div class="rule"><span class="rule-label">Preghiera</span></div>

        <div class="btn-grid">
            <button class="btn btn-ghost span-2" onclick="openPdfViewer('adorazione.pdf')">Adorazione Eucaristica</button>
            <button class="btn btn-ghost" onclick="redirectToVespri()">Vespri</button>
            <button class="btn btn-ghost" onclick="openPdfViewer('compieta.pdf')">Compieta</button>
            <button class="btn btn-ghost" onclick="openPdfViewer('canti_liturgici.pdf')">Canti Liturgici</button>
            <button class="btn btn-ghost" onclick="openPdfViewer('canti_adorazione.pdf')">Canti Adorazione</button>
        </div>
    </div>

</div>
<script>
    const LITURGY_PALETTE = {
        bianco: '#C8B97A',
        verde:  '#3D7A50',
        rosso:  '#A62020',
        viola:  '#6B3FA0',
        rosa:   '#C97090',
        nero:   '#3A3A3A',
        oro:    '#A87C28',
    };

    function formatTodayDate() {
        const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
        const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
        const d = new Date();
        return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    async function fetchLiturgicalInfo() {
        const d = new Date();
        const dateStr = `${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`;
        try {
            const res = await fetch(`assets/liturgia/${dateStr}.json`);
            if (!res.ok) throw new Error();
            const data = await res.json();

            const accent = LITURGY_PALETTE[(data.colore||'').toLowerCase()] || LITURGY_PALETTE.oro;
            const card = document.getElementById('liturgia-card');
            card.style.setProperty('--liturgy-accent', accent);
            card.style.setProperty('--card-accent', accent);

            const letture = (data.letture || [])
                .map(l => `<a class="lettura-chip" href="${l.url}" target="_blank">${l.sigla}</a>`)
                .join('');

            const rangoHtml = data.celebrazione
                ? `<div class="liturgia-rango">
                     <span class="color-pip"></span>
                     <span class="liturgia-celebrazione">${data.celebrazione}${data.colore ? ' &mdash; ' + data.colore : ''}</span>
                   </div>`
                : '';

            document.getElementById('liturgical-details').innerHTML = `
                <p class="liturgia-settimana">${data.settimana || '—'}</p>
                ${rangoHtml}
                ${letture ? `<div class="letture-row">${letture}</div>` : ''}
            `;
        } catch {
            document.getElementById('liturgical-details').innerHTML =
                '<p class="loading-state">Informazioni non disponibili per oggi.</p>';
        }
    }

    function redirectToLiturgia() {
        const d = new Date();
        const s = `${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`;
        window.location.href = `https://www.lachiesa.it/calendario/${s}.html`;
    }

    function redirectToVespri() {
        window.location.href = 'https://www.ibreviary.com/m2/breviario.php?s=vespri';
    }

    function openPdfViewer(f) {
        window.location.href = `pdf_viewer.html?file=${encodeURIComponent(f)}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('current-date').textContent = formatTodayDate();
        fetchLiturgicalInfo();
    });
</script>
</body>
</html>
